services:
  api-gateway:
    image: arvind090/api-gateway:latest
    container_name: api-gateway
    ports:
      - "8000:8000"
    environment:
      - USER_SERVICE_URL=http://user-service:8001
      - ORDER_SERVICE_URL=http://order-service:8002
    depends_on:
      - user-service
      - order-service
    restart: always
    networks:
      - microservices-net

  user-service:
    image: arvind090/user-service:latest
    container_name: user-service
    ports:
      - "8001:8001"
    restart: always
    networks:
      - microservices-net

  order-service:
    image: arvind090/order-service:latest
    container_name: order-service
    ports:
      - "8002:8002"
    restart: always
    networks:
      - microservices-net

networks:
  microservices-net:
    driver: bridge
